server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  location / {
    try_files $uri /index.html;
  }

  # Proxy hacia backend ventas (Elastic IP)
  location /api/v1/ventas {
    proxy_pass http://32.194.222.193:8082/api/v1/ventas;
  }

  # Proxy hacia backend despachos (Elastic IP)
  location /api/v1/despachos {
    proxy_pass http://32.194.222.193:8081/api/v1/despachos;
  }
}
