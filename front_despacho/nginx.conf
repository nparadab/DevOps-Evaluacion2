server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  location / {
    try_files $uri /index.html;
  }

  # Proxy hacia backend ventas
  location /api/v1/ventas {
    proxy_pass http://back-ventas:8082/api/v1/ventas;
  }

  # Proxy hacia backend despachos
  location /api/v1/despachos {
    proxy_pass http://back-despachos:8081/api/v1/despachos;
  }
}
