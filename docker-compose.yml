version: "3.8"

services:
  db:
    image: mysql:8.0
    container_name: mysql-db
    environment:
      MYSQL_ROOT_PASSWORD: admin123
      MYSQL_DATABASE: innovadb
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  back-despachos:
    build: ./back-Despachos_SpringBoot
    container_name: back-despachos
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/innovadb?allowPublicKeyRetrieval=true&useSSL=false
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: admin123
    ports:
      - "8081:8080"
    depends_on:
      - db

  back-ventas:
    build: ./back-Ventas_SpringBoot
    container_name: back-ventas
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/innovadb?allowPublicKeyRetrieval=true&useSSL=false
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: admin123
    ports:
      - "8082:8080"
    depends_on:
      - db

  frontend:
    build: ./frontend
    container_name: frontend
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - back-despachos
      - back-ventas

volumes:
  db_data:
