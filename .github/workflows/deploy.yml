name: Deploy to ECR

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push frontend
        run: |
          docker build -t ${{ steps.login-ecr.outputs.registry }}/frontend:latest \
            -f ./front_despacho/Dockerfile ./front_despacho
          docker push ${{ steps.login-ecr.outputs.registry }}/frontend:latest

      - name: Build and push back-despachos
        run: |
          docker build -t ${{ steps.login-ecr.outputs.registry }}/back-despachos:latest \
            -f ./back-Despachos_SpringBoot/Springboot-API-REST-DESPACHO/Dockerfile ./back-Despachos_SpringBoot/Springboot-API-REST-DESPACHO
          docker push ${{ steps.login-ecr.outputs.registry }}/back-despachos:latest

      - name: Build and push back-ventas
        run: |
          docker build -t ${{ steps.login-ecr.outputs.registry }}/back-ventas:latest \
            -f ./back-Ventas_SpringBoot/Springboot-API-REST/Dockerfile ./back-Ventas_SpringBoot/Springboot-API-REST
          docker push ${{ steps.login-ecr.outputs.registry }}/back-ventas:latest

  deploy-frontend:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy frontend to EC2 via SSH
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.EC2_FRONTEND_IP }}
          username: ${{ secrets.EC2_SSH_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin 416345627870.dkr.ecr.us-east-1.amazonaws.com
            rm -rf /tmp/nginx-conf
            mkdir -p /tmp/nginx-conf
            cat > /tmp/nginx-conf/default.conf <<'EOF'
              server {
                listen 80;
                server_name _;
                root /usr/share/nginx/html;
                index index.html;

                location ~ ^/api/v1/ventas(/.*)?$ {
                  rewrite ^(/api/v1/ventas)/$ $1 break;
                  proxy_pass http://10.0.2.109:8080;
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
                  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                }

                location ~ ^/api/v1/despachos(/.*)?$ {
                  rewrite ^(/api/v1/despachos)/$ $1 break;
                  proxy_pass http://10.0.2.109:8081;
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
                  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                }

                location / {
                  try_files $uri /index.html;
                }
              }
            EOF
            docker pull 416345627870.dkr.ecr.us-east-1.amazonaws.com/frontend:latest
            docker rm -f front-nginx 2>/dev/null || true
            docker run -d --restart unless-stopped --name front-nginx -p 80:80 \
              -v /tmp/nginx-conf:/etc/nginx/conf.d:ro \
              416345627870.dkr.ecr.us-east-1.amazonaws.com/frontend:latest

